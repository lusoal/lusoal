name: GitHub metrics

# Generates a static SVG of GitHub stats and commits it to the repo, so the
# README image never depends on a flaky third-party service (github-readme-stats
# returns 503 under rate limits). The SVG is rendered by lowlighter/metrics.
on:
  schedule:
    - cron: "0 6 * * *" # daily
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Overview panel
        uses: lowlighter/metrics@latest
        with:
          # A classic Personal Access Token with `repo` + `read:org` scope,
          # stored as the METRICS_TOKEN repository secret (see stats/README.md).
          token: ${{ secrets.METRICS_TOKEN }}
          user: lusoal
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Chicago
          committer_message: "chore: refresh GitHub metrics"

      - name: Languages panel
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lusoal
          filename: github-metrics-languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          config_timezone: America/Chicago
          committer_message: "chore: refresh GitHub metrics (languages)"
